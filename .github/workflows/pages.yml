name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Prepare static site
        run: |
          mkdir -p dist/src dist/examples dist/target/wasm32-unknown-unknown/release
          cp index.html styles.css .nojekyll dist/
          cp src/app.js src/worker.js dist/src/
          cp examples/sample.jsonl dist/examples/
          cp target/wasm32-unknown-unknown/release/giant_jsonl_viewer.wasm dist/target/wasm32-unknown-unknown/release/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
